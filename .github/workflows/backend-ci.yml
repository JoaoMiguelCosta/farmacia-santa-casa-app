name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: farmacia_santa_casa_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d farmacia_santa_casa_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      TZ: Europe/Lisbon
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/farmacia_santa_casa_ci?schema=public

      JWT_SECRET: ci_jwt_secret_with_enough_length_for_tests
      JWT_EXPIRES_IN: 1d

      AUTH_COOKIE_NAME: farmacia_santa_casa_token
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: lax

      ALLOWED_ORIGINS: http://localhost:5173
      TRUST_PROXY: "false"
      ENABLE_JOBS: "false"
      ALLOW_PRODUCTION_SEED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Run unit tests
        run: npm run test:unit -- --run

      - name: Run integration tests
        run: npm run test:integration -- --run

      - name: Run E2E tests
        run: npm run test:e2e -- --run

      - name: Run coverage
        run: npm run test:coverage

      - name: Run backend validation
        run: npm run validate